<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sistema de Costeo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
  <main class="login-card">
    <div class="login-logo">SC</div>
    <h1>Sistema de Costeo</h1>
    <p>Restaurante</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="alerts">
          {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }}">{{ msg }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login', next=request.args.get('next', '')) }}">
      <div class="form-group">
        <label>Usuario</label>
        <input name="username" required autofocus autocomplete="username">
      </div>
      <div class="form-group">
        <label>Contrasena</label>
        <input type="password" name="password" required autocomplete="current-password">
      </div>
      <button class="btn btn-primary btn-full" type="submit">Ingresar</button>
    </form>
  </main>
</body>
</html>
